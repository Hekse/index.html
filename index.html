<!doctype html>
<html lang="fi" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#07111f" />
  <title>Opero Ajo – release cleanup</title>
  <style>
    :root{--safe-bottom:env(safe-area-inset-bottom,0px);--shadow:0 12px 32px rgba(0,0,0,.25);--radius:22px}
    html[data-theme="dark"]{--bg:#07111f;--panel:#0d1b2f;--panel2:#10233d;--text:#eef4ff;--muted:#9db0d3;--line:rgba(125,170,255,.18);--brand:#2f80ff;--brand2:#6ea8ff;--heroGlow:rgba(47,128,255,.18);--inputBg:#091525;--navBg:rgba(7,17,31,.78);--bodyBg:radial-gradient(circle at 50% 8%, rgba(20,72,160,.20), transparent 34%),linear-gradient(180deg,#07111f 0%, #091726 100%)}
    html[data-theme="light"]{--bg:#eaf1fb;--panel:#ffffff;--panel2:#edf4ff;--text:#10213c;--muted:#5f7397;--line:rgba(76,112,173,.20);--brand:#2f80ff;--brand2:#6ea8ff;--heroGlow:rgba(47,128,255,.10);--inputBg:#f7faff;--navBg:rgba(234,241,251,.86);--bodyBg:radial-gradient(circle at 50% 8%, rgba(80,132,230,.13), transparent 34%),linear-gradient(180deg,#eef4ff 0%, #e8f0fb 100%)}
    *{box-sizing:border-box} html,body{margin:0;padding:0;min-height:100%;background:var(--bg)} body{min-height:100vh;background:var(--bodyBg);background-attachment:fixed;color:var(--text);font:15px/1.45 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;overflow-x:hidden}
    input,textarea,select{user-select:text} button{-webkit-tap-highlight-color:transparent}
    .app{max-width:760px;margin:0 auto;padding:18px 14px calc(110px + var(--safe-bottom))}
    .splash{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 40%, rgba(36,104,255,.22), transparent 20%),radial-gradient(circle at 50% 65%, rgba(35,123,255,.12), transparent 16%),linear-gradient(180deg,#030814 0%, #041024 55%, #030814 100%);transition:opacity .45s ease, visibility .45s ease}
    .splash.hidden{opacity:0;visibility:hidden;pointer-events:none}
    .splash-inner{width:min(92vw,460px);min-height:540px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;text-align:center}
    .splash-glow{position:absolute;width:320px;height:320px;border-radius:999px;border:1px solid rgba(114,171,255,.10);box-shadow:0 0 50px rgba(38,121,255,.10) inset,0 0 80px rgba(38,121,255,.08);top:88px;left:50%;transform:translateX(-50%)}
    .splash-brand{display:flex;align-items:center;gap:14px;margin-bottom:10px;position:relative;z-index:2}
    .splash-logo{width:78px;height:78px;border-radius:999px;position:relative;background:radial-gradient(circle at 30% 30%, #33b1ff 0%, #1f7fff 35%, #0e56df 68%, #0a2f7d 100%);box-shadow:inset 0 1px 0 rgba(255,255,255,.16),0 0 28px rgba(47,128,255,.28)}
    .splash-logo:before{content:'';position:absolute;inset:11px;border-radius:999px;border:5px solid rgba(255,255,255,.96);border-right-color:transparent;transform:rotate(-18deg)}
    .splash-logo:after{content:'';position:absolute;left:36px;top:8px;width:6px;height:60px;border-radius:6px;background:linear-gradient(180deg,#eef8ff,#c8e7ff 55%,#8ecbff 100%);transform:rotate(41deg)}
    .splash-word{font-size:44px;font-weight:900;letter-spacing:.02em;color:white}
    .splash-line{width:170px;height:2px;border-radius:999px;background:linear-gradient(90deg, transparent 0%, #1f85ff 18%, #6cc2ff 50%, #1f85ff 82%, transparent 100%);margin:8px auto 10px;box-shadow:0 0 16px rgba(79,165,255,.45)}
    .splash-sub{font-size:28px;font-weight:700;letter-spacing:.18em;color:white;margin-left:.18em;margin-bottom:150px;position:relative;z-index:2}
    .splash-loader{width:220px;margin:0 auto 18px;position:relative;z-index:2}.splash-loader-bar{height:3px;border-radius:999px;background:linear-gradient(90deg, transparent 0%, #1590ff 20%, #6fd0ff 50%, #1590ff 80%, transparent 100%);box-shadow:0 0 16px rgba(83,173,255,.55);animation:loaderPulse 1.5s ease-in-out infinite}.splash-text{color:rgba(255,255,255,.88);font-size:15px;letter-spacing:.03em;margin-bottom:4px;position:relative;z-index:2}@keyframes loaderPulse{0%,100%{transform:scaleX(.82);opacity:.75}50%{transform:scaleX(1);opacity:1}}
    .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;position:sticky;top:0;z-index:8;padding:8px 0 10px;background:linear-gradient(180deg,var(--navBg),rgba(0,0,0,0));backdrop-filter:blur(14px)}
    .brand-wrap{display:flex;align-items:center;gap:14px}.brand-logo{width:54px;height:54px;border-radius:999px;position:relative;background:radial-gradient(circle at 30% 30%, #33b1ff 0%, #1f7fff 35%, #0e56df 68%, #0a2f7d 100%);box-shadow:inset 0 1px 0 rgba(255,255,255,.16),0 0 22px rgba(47,128,255,.24)} .brand-logo:before{content:'';position:absolute;inset:8px;border-radius:999px;border:4px solid rgba(255,255,255,.94);border-right-color:transparent;transform:rotate(-18deg)} .brand-logo:after{content:'';position:absolute;left:24px;top:6px;width:5px;height:42px;border-radius:5px;background:linear-gradient(180deg,#eef8ff,#c8e7ff 55%,#8ecbff 100%);transform:rotate(41deg)} .brand-stack{display:flex;flex-direction:column;gap:6px;line-height:1}.brand-title{font-weight:900;letter-spacing:.05em;font-size:28px}.brand-sub{font-weight:700;letter-spacing:.22em;font-size:15px;margin-left:.22em}
    .card{background:linear-gradient(180deg,var(--panel),rgba(0,0,0,0.02));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:14px;overflow:hidden}
    .hero{padding:20px;background:radial-gradient(circle at top right,var(--heroGlow),transparent 34%),linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.015))}
    .action-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .action-btn{border:1px solid var(--line);border-radius:24px;min-height:150px;background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.015));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer;color:var(--text)}
    .emoji-icon{font-size:44px;line-height:1;display:block;filter:drop-shadow(0 4px 10px rgba(0,0,0,.18))}.nav-emoji{font-size:24px;line-height:1;display:block}.action-label{font-weight:800;font-size:22px;color:var(--text)}
    .btn,.ghost,.danger,.small-btn,.tab{border:0;border-radius:14px;padding:13px 14px;font-weight:700;cursor:pointer;font-size:15px}
    .btn{background:linear-gradient(180deg,var(--brand2),var(--brand));color:white;box-shadow:0 10px 20px rgba(47,128,255,.24)} .ghost{background:rgba(255,255,255,.05);color:var(--text);border:1px solid var(--line)} .danger{background:rgba(239,68,68,.12);color:#ffd2d2;border:1px solid rgba(239,68,68,.25)} .small-btn{background:rgba(47,128,255,.12);color:var(--text);border:1px solid rgba(47,128,255,.25);padding:10px 12px;font-size:14px}
    .section-title{display:flex;align-items:center;justify-content:space-between;margin:0 0 10px}.section-title h2{font-size:17px;margin:0}.hidden{display:none!important}.grid{display:grid;gap:12px}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px} label{display:block;font-size:13px;color:var(--text);margin:0 0 7px;font-weight:700}
    input,select,textarea{width:100%;background:var(--inputBg);color:var(--text);border:1px solid var(--line);border-radius:14px;padding:13px 12px;font:inherit;outline:none} input::placeholder,textarea::placeholder{color:var(--muted)} textarea{min-height:90px;resize:vertical}
    .switch-row{display:flex;gap:10px}.switch-row .tab{flex:1;background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--line)}.switch-row .tab.active{background:rgba(47,128,255,.18);color:white;border-color:rgba(47,128,255,.4)}
    .result-box{background:linear-gradient(180deg,rgba(34,197,94,.12),rgba(34,197,94,.06));border:1px solid rgba(34,197,94,.22);color:var(--text);border-radius:16px;padding:12px}
    .warn-box{background:linear-gradient(180deg,rgba(250,204,21,.12),rgba(250,204,21,.06));border:1px solid rgba(250,204,21,.22);color:var(--text);border-radius:16px;padding:12px}
    .list{display:grid;gap:10px}.item{background:rgba(255,255,255,.035);border:1px solid var(--line);border-radius:16px;padding:13px}.item-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.item-title{font-weight:800}.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);padding:6px 9px;border-radius:999px;font-size:12px;color:var(--text);background:rgba(255,255,255,.03)}.item-meta{margin-top:8px;color:var(--muted);font-size:13px}.row{display:flex;gap:10px;align-items:center}.row-between{display:flex;justify-content:space-between;gap:12px;align-items:center}.right{text-align:right}.totals{display:grid;gap:10px}.total{display:flex;justify-content:space-between;gap:10px;padding:12px 0;border-bottom:1px dashed var(--line)}.total:last-child{border-bottom:0;padding-bottom:0}.empty{padding:18px;text-align:center;color:var(--muted)}.divider{height:1px;background:var(--line);margin:8px 0}.mini{font-size:12px;color:var(--muted)}.chip-row{display:flex;gap:8px;flex-wrap:wrap}.chip{padding:8px 10px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.03);font-size:12px;color:var(--text)}.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px}.stat{padding:13px;border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.025));border:1px solid var(--line)}.stat-label{font-size:12px;color:var(--muted);margin-bottom:6px}.stat-value{font-size:20px;font-weight:900;letter-spacing:.01em}
    .toast-wrap{position:fixed;left:12px;right:12px;top:14px;z-index:30;display:grid;gap:8px;pointer-events:none}.toast{margin-left:auto;max-width:520px;background:linear-gradient(180deg,var(--panel),rgba(0,0,0,.02));border:1px solid var(--line);color:var(--text);padding:12px 14px;border-radius:16px;box-shadow:var(--shadow)}.toast.good{border-color:rgba(34,197,94,.25)}.toast.warn{border-color:rgba(250,204,21,.3)}.toast.bad{border-color:rgba(239,68,68,.3)}.receipt-thumb{margin-top:10px;max-width:100%;max-height:160px;border-radius:12px;border:1px solid var(--line);display:block;object-fit:cover}
    .bottom-nav{position:fixed;left:0;right:0;bottom:0;padding:10px 12px calc(10px + var(--safe-bottom));background:var(--navBg);backdrop-filter:blur(22px);border-top:1px solid var(--line);z-index:12}
    .bottom-nav .inner{max-width:760px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.nav-btn{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:18px;padding:12px 8px;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60px;gap:0}.nav-btn.active{background:rgba(47,128,255,.16);color:var(--text);border-color:rgba(47,128,255,.35)}
    @media (max-width:620px){.grid-2{grid-template-columns:1fr}.brand-title{font-size:24px}.brand-sub{font-size:13px}.splash-word{font-size:38px}.splash-sub{font-size:24px}.action-btn{min-height:126px}.emoji-icon{font-size:38px}.action-label{font-size:18px}}
    @media print{body{background:#fff;color:#000}.bottom-nav,.no-print,.topbar,.splash,.report-topbar{display:none!important}.app{padding:0;max-width:none}.card{box-shadow:none;border:1px solid #ccc;background:#fff;color:#000}input,select,textarea,button{display:none!important}}
  </style>
</head>
<body>
  <div id="splashScreen" class="splash"><div class="splash-inner"><div class="splash-glow"></div><div class="splash-brand"><div class="splash-logo"></div><div class="splash-word">OPERO</div></div><div class="splash-line"></div><div class="splash-sub">AJO</div><div class="splash-loader"><div class="splash-loader-bar"></div></div><div class="splash-text">Loading...</div></div></div>
  <div id="toastWrap" class="toast-wrap no-print"></div>
  <div class="app">
    <div class="topbar no-print"><div class="brand-wrap"><div class="brand-logo"></div><div class="brand-stack"><div class="brand-title">OPERO</div><div class="brand-sub">AJO</div></div></div></div>
    <section id="screen-home"><div class="card hero"><div class="action-grid no-print">
      <button class="action-btn" type="button" onclick="go('new')"><span class="emoji-icon">🚗</span><div class="action-label" data-i18n="newTrip"></div></button>
      <button class="action-btn" type="button" onclick="go('report')"><span class="emoji-icon">📄</span><div class="action-label" data-i18n="report"></div></button>
      <button class="action-btn" type="button" onclick="go('drives')"><span class="emoji-icon">🛣️</span><div class="action-label" data-i18n="trips"></div></button>
      <button class="action-btn" type="button" onclick="go('settings')"><span class="emoji-icon">⚙️</span><div class="action-label" data-i18n="settings"></div></button>
    </div></div>
    <div class="card"><div class="section-title"><h2 data-i18n="thisMonthSummary"></h2><span class="mini" id="homeMonthLabel"></span></div><div id="homeStats" class="stats-grid"></div></div>
    <div class="card"><div class="section-title"><h2 data-i18n="recentTrips"></h2></div><div id="recentDrives" class="list"></div></div></section>
    <section id="screen-new" class="hidden"><div class="card"><div class="section-title"><h2 data-i18n="newTrip"></h2></div><div class="grid">
      <div><label for="driveDate" data-i18n="date"></label><input id="driveDate" type="date" /></div>
      <div><label for="startLocationSelect" data-i18n="startLocation"></label><select id="startLocationSelect"></select></div>
      <div class="no-print"><button class="small-btn" type="button" onclick="useCurrentLocationAsStart()" data-i18n="locateCurrent"></button><div id="geoStatus" class="mini" style="margin-top:8px"></div></div>
      <div id="customStartWrap" class="hidden"><label for="customStartAddress" data-i18n="customStartAddress"></label><input id="customStartAddress" type="text" /></div>
      <div><label for="placeName" data-i18n="placeNameOptional"></label><input id="placeName" type="text" /></div>
      <div><label for="destinationAddress" data-i18n="destinationOrAddress"></label><input id="destinationAddress" type="text" /></div>
      <div class="card" style="margin:0;background:rgba(255,255,255,.02)"><div class="section-title"><h2 data-i18n="extraStops"></h2><button class="small-btn no-print" type="button" onclick="addDraftStop()" data-i18n="addStop"></button></div><div id="draftStopsList" class="list"></div></div>
      <div><label for="purpose" data-i18n="tripPurpose"></label><input id="purpose" type="text" /></div>
      <div class="grid-2"><div><label for="kmRate" data-i18n="kmRate"></label><input id="kmRate" type="number" step="0.01" min="0" inputmode="decimal" /></div><div><label for="distanceKm" data-i18n="km"></label><input id="distanceKm" type="number" step="0.1" min="0" inputmode="decimal" /></div></div>
      <div class="switch-row no-print"><button class="tab active" id="oneWayBtn" type="button" data-i18n="oneWay"></button><button class="tab" id="roundTripBtn" type="button" data-i18n="roundTrip"></button></div>
      <div class="grid-2 no-print"><button class="small-btn" type="button" onclick="lookupDistance()" data-i18n="calculateDistance"></button><button class="ghost" type="button" onclick="openRouteInMaps()" data-i18n="openRouteInMap"></button></div>
      <div id="distanceStatus" class="mini"></div>

      <div class="card" style="margin:0;background:rgba(255,255,255,.02)"><div class="section-title"><h2 data-i18n="expenses"></h2><button class="small-btn no-print" type="button" onclick="openExpenseModal()" data-i18n="addExpense"></button></div><div id="expenseDraftList" class="list"></div></div>
      <div><label for="notes" data-i18n="notes"></label><textarea id="notes"></textarea></div>
      <div class="warn-box"><div data-i18n="distanceFallbackHelp"></div></div>
      <div class="result-box"><div class="row-between"><span data-i18n="mileageCompensation"></span><strong id="kmCompValue">0,00 €</strong></div><div class="row-between" style="margin-top:6px"><span data-i18n="expenseTotal"></span><strong id="expenseTotalValue">0,00 €</strong></div><div class="row-between" style="margin-top:6px"><span data-i18n="grandTotal"></span><strong id="grandTotalValue">0,00 €</strong></div></div>
      <div class="grid-2 no-print"><button class="btn" type="button" onclick="saveDrive()" data-i18n="saveTrip"></button><button class="ghost" type="button" onclick="resetDriveForm()" data-i18n="clear"></button></div>
    </div></div></section>
    <section id="screen-drives" class="hidden"><div class="card"><div class="section-title"><h2 data-i18n="trips"></h2><span class="mini" id="driveCountLabel"></span></div><div id="drivesList" class="list"></div></div></section>
    <section id="screen-report" class="hidden"><div class="card"><div class="section-title"><h2 data-i18n="report"></h2></div><div class="grid"><div class="grid-2"><div><label for="reportMonth" data-i18n="month"></label><select id="reportMonth"></select></div><div><label for="reportYear" data-i18n="year"></label><select id="reportYear"></select></div></div><div class="totals" id="reportTotals"></div><div class="no-print"><label class="row" style="align-items:center;gap:10px"><input id="includeReceiptsInPdf" type="checkbox" style="width:auto" /><span data-i18n="includeReceiptsInPdf"></span></label></div><div class="grid-2 no-print"><button class="btn" type="button" onclick="openPrintableReport()" data-i18n="createPdfView"></button><button class="ghost" type="button" onclick="refreshReport()" data-i18n="refreshSummary"></button></div></div></div><div class="card"><div class="section-title"><h2 data-i18n="reportRows"></h2></div><div id="reportRows" class="list"></div></div></section>
    <section id="screen-settings" class="hidden"><div class="card"><div class="section-title"><h2 data-i18n="settings"></h2></div><div class="grid-2">
      <div><label for="userName" data-i18n="name"></label><input id="userName" type="text" /></div>
      <div><label for="defaultKmRate" data-i18n="defaultKmRate"></label><input id="defaultKmRate" type="number" step="0.01" min="0" inputmode="decimal" /></div>
      <div><label for="themeSelect" data-i18n="theme"></label><select id="themeSelect"><option value="dark" data-i18n="darkTheme"></option><option value="light" data-i18n="lightTheme"></option></select></div>
      <div><label for="languageSelect" data-i18n="language"></label><select id="languageSelect"><option value="fi">Suomi</option><option value="en">English</option></select></div>
    </div></div>
    <div class="card"><div class="section-title"><h2 data-i18n="savedStartLocations"></h2><span class="mini">Max 5</span></div><div id="savedLocationsList" class="list"></div><div class="divider"></div><div class="grid"><div><label for="newLocationName" data-i18n="placeName"></label><input id="newLocationName" type="text" /></div><div><label for="newLocationAddress" data-i18n="address"></label><input id="newLocationAddress" type="text" /></div><button class="small-btn no-print" type="button" onclick="addSavedLocation()" data-i18n="addStartLocation"></button></div></div>
    <div class="card no-print"><div class="section-title"><h2 data-i18n="data"></h2></div><div class="grid-2"><button class="ghost" type="button" onclick="exportJson()" data-i18n="exportBackup"></button><label class="ghost" style="display:flex;align-items:center;justify-content:center;min-height:48px;cursor:pointer"><span data-i18n="importBackup"></span><input id="importJsonInput" type="file" accept="application/json" style="display:none" onchange="importJson(event)" /></label></div></div></section>
  </div>
  <div class="bottom-nav no-print"><div class="inner">
    <button class="nav-btn active" data-screen="home" onclick="go('home')"><span class="nav-emoji">🏚️</span></button>
    <button class="nav-btn" data-screen="new" onclick="go('new')"><span class="nav-emoji">🚗</span></button>
    <button class="nav-btn" data-screen="drives" onclick="go('drives')"><span class="nav-emoji">🛣️</span></button>
    <button class="nav-btn" data-screen="report" onclick="go('report')"><span class="nav-emoji">📄</span></button>
  </div></div>
  <dialog id="expenseModal" style="max-width:560px;width:calc(100% - 24px);border:1px solid rgba(125,170,255,.18);border-radius:18px;background:var(--panel);color:var(--text);padding:0;box-shadow:0 20px 50px rgba(0,0,0,.45)"><form method="dialog" style="padding:16px"><div class="section-title"><h2 data-i18n="addExpenseTitle"></h2><button class="ghost" value="cancel" type="submit" data-i18n="close"></button></div><div class="grid"><div><label for="expenseType" data-i18n="type"></label><select id="expenseType" onchange="handleExpenseTypeChange()"><option value="parking"></option><option value="fuel"></option><option value="toll"></option><option value="lodging"></option><option value="other"></option></select></div><div id="expenseCustomTypeWrap" class="hidden"><label for="expenseCustomType" data-i18n="descriptionLabel"></label><input id="expenseCustomType" type="text" /></div><div><label for="expenseAmount" data-i18n="amountEuro"></label><input id="expenseAmount" type="number" step="0.01" min="0" inputmode="decimal" /></div><div><label for="expenseDescription" data-i18n="descriptionLabel"></label><input id="expenseDescription" type="text" /></div><div><label for="expenseReceipt" data-i18n="receiptImage"></label><input id="expenseReceipt" type="file" accept=".jpg,.jpeg,.png,.webp,image/*" /></div><div class="grid-2"><button class="btn" type="button" onclick="addDraftExpense()" data-i18n="saveExpense"></button><button class="ghost" value="cancel" type="submit" data-i18n="cancel"></button></div></div></form></dialog>
  <script>

    function buildSearchCandidates(text){const q=normalizeText(text);return q?uniqueQueries([q,`${q}, Finland`,`${q}, Suomi`]):[]}

    function saveDrive(){const date=document.getElementById('driveDate').value, start=getSelectedStartLocation(), placeName=normalizeText(document.getElementById('placeName').value), destinationAddress=normalizeText(document.getElementById('destinationAddress').value), purpose=normalizeText(document.getElementById('purpose').value), baseKm=Number(document.getElementById('distanceKm').value||0), rate=Number(document.getElementById('kmRate').value||0), notes=normalizeText(document.getElementById('notes').value), cleanStops=ui.draftStops.map(s=>({...s,address:normalizeText(s.address)})).filter(s=>s.address), effectivePlaceName=placeName||destinationAddress; if(!date||!start.address||!destinationAddress){alert(t('saveTripNeedFields'));return} const distanceKm=ui.roundTrip?baseKm*2:baseKm, kmCompensation=distanceKm*rate, expenseTotal=ui.draftExpenses.reduce((sum,x)=>sum+Number(x.amount||0),0), total=kmCompensation+expenseTotal; state.drives.unshift({id:cryptoRandom(),date,startLabel:start.label,startAddress:start.address,placeName:effectivePlaceName,destinationAddress,extraStops:cleanStops,purpose,roundTrip:ui.roundTrip,distanceKm,kmRate:rate,kmCompensation,expenses:JSON.parse(JSON.stringify(ui.draftExpenses)),expenseTotal,total,notes,createdAt:new Date().toISOString()}); saveState(); resetDriveForm(); renderHome(); renderDrives(); refreshReport(); toast(t('tripSaved')); go('drives')}
    function buildRouteText(d){return [d.startLabel||d.startAddress||'',...((d.extraStops||[]).map(s=>s.address).filter(Boolean)),d.destinationAddress||''].filter(Boolean).join(' → ')}
    function renderDrives(){const wrap=document.getElementById('drivesList'); document.getElementById('driveCountLabel').textContent=`${state.drives.length} ${t('drivesCount')}`; wrap.innerHTML=state.drives.length?state.drives.map(d=>`<div class="item"><div class="item-head"><div><div class="item-title">${formatDate(d.date)} · ${escapeHtml(d.placeName)}</div><div class="item-meta">${escapeHtml(buildRouteText(d))}</div></div><div class="right"><div class="pill">${Number(d.distanceKm||0).toLocaleString('fi-FI',{maximumFractionDigits:1})} km</div><div style="margin-top:8px;font-weight:800">${euro(d.total)}</div></div></div><div class="item-meta">${t('tripType')}: ${d.roundTrip?t('roundTripLabel'):t('outbound')} · ${t('monthlyMileageComp')} ${euro(d.kmCompensation)} · ${t('expenses')} ${euro(d.expenseTotal)}${d.purpose?' · '+escapeHtml(d.purpose):''}</div>${(d.extraStops&&d.extraStops.length)?`<div class="chip-row" style="margin-top:10px">${d.extraStops.map((s,i)=>`<span class="chip">${t('stop')} ${i+1}: ${escapeHtml(s.address)}</span>`).join('')}</div>`:''}${(d.expenses&&d.expenses.length)?`<div class="chip-row" style="margin-top:10px">${d.expenses.map(e=>`<span class="chip">${escapeHtml(e.type)} ${euro(e.amount)}</span>`).join('')}</div>`:''}<div class="grid-2 no-print" style="margin-top:12px"><button class="ghost" type="button" onclick="viewDrive('${d.id}')">${t('viewOpen')}</button><button class="danger" type="button" onclick="deleteDrive('${d.id}')">${t('remove')}</button></div></div>`).join(''):`<div class="empty">${t('noDrivesYet')}</div>`}
    function viewDrive(id){const d=state.drives.find(x=>x.id===id); if(!d) return; const stopsText=(d.extraStops||[]).length?`\n${t('extraStops')}:\n`+d.extraStops.map((s,i)=>`${i+1}. ${s.address}`).join('\n')+'\n':''; alert(`${formatDate(d.date)}\n\n${t('start')}: ${d.startLabel}\n${t('destination')}: ${d.placeName}\n${t('routeSearchText')}: ${d.destinationAddress}\n${stopsText}Km: ${Number(d.distanceKm).toLocaleString('fi-FI',{maximumFractionDigits:1})}\n${t('monthlyMileageComp')}: ${euro(d.kmCompensation)}\n${t('expenses')}: ${euro(d.expenseTotal)}\n${t('totalLabel')}: ${euro(d.total)}\n\n${d.notes?t('notePrefix')+' '+d.notes+'\n\n':''}${t('expenseRows')}: ${(d.expenses||[]).length}`)}
    function deleteDrive(id){if(!confirm(t('deleteConfirm'))) return; state.drives=state.drives.filter(x=>x.id!==id); saveState(); renderDrives(); renderHome(); refreshReport(); toast(t('tripDeleted'),'bad')}
    function renderHome(){const now=new Date(); document.getElementById('homeMonthLabel').textContent=`${getMonthName(now.getMonth())} ${now.getFullYear()}`; const data=getMonthData(now.getMonth()+1,now.getFullYear()); document.getElementById('homeStats').innerHTML=`<div class="stat"><div class="stat-label">${t('monthlyKilometers')}</div><div class="stat-value">${Number(data.km).toLocaleString('fi-FI',{maximumFractionDigits:1})} km</div></div><div class="stat"><div class="stat-label">${t('monthlyMileageComp')}</div><div class="stat-value">${euro(data.kmComp)}</div></div><div class="stat"><div class="stat-label">${t('monthlyExpenses')}</div><div class="stat-value">${euro(data.expenses)}</div></div><div class="stat"><div class="stat-label">${t('monthlyTotal')}</div><div class="stat-value">${euro(data.total)}</div></div>`; const recent=state.drives.slice(0,4); document.getElementById('recentDrives').innerHTML=recent.length?recent.map(d=>`<div class="item"><div class="item-head"><div><div class="item-title">${formatDate(d.date)} · ${escapeHtml(d.placeName)}</div><div class="item-meta">${escapeHtml(buildRouteText(d))}</div></div><div class="right"><strong>${euro(d.total)}</strong></div></div></div>`).join(''):`<div class="empty">${t('noTripsThisMonth')}</div>`}
    function fillReportSelectors(){const m=document.getElementById('reportMonth'), y=document.getElementById('reportYear'); m.innerHTML=(monthNames[state.settings.language]||monthNames.fi).map((n,i)=>`<option value="${i+1}">${n}</option>`).join(''); const currentYear=new Date().getFullYear(); y.innerHTML=[currentYear-1,currentYear,currentYear+1].map(v=>`<option value="${v}">${v}</option>`).join(''); m.value=String(new Date().getMonth()+1); y.value=String(currentYear)}
    function getMonthData(month,year){const filtered=state.drives.filter(d=>{const dt=new Date(d.date+'T00:00:00'); return dt.getMonth()+1===Number(month)&&dt.getFullYear()===Number(year)}); return {drives:filtered,km:filtered.reduce((s,d)=>s+Number(d.distanceKm||0),0),kmComp:filtered.reduce((s,d)=>s+Number(d.kmCompensation||0),0),expenses:filtered.reduce((s,d)=>s+Number(d.expenseTotal||0),0),total:filtered.reduce((s,d)=>s+Number(d.total||0),0)}}
    function refreshReport(){const month=Number(document.getElementById('reportMonth').value), year=Number(document.getElementById('reportYear').value), data=getMonthData(month,year); document.getElementById('reportTotals').innerHTML=`<div class="total"><span>${t('monthlyDrives')}</span><strong>${data.drives.length} ${t('tripsCountSuffix')}</strong></div><div class="total"><span>${t('monthlyKilometers')}</span><strong>${Number(data.km).toLocaleString('fi-FI',{maximumFractionDigits:1})} km</strong></div><div class="total"><span>${t('monthlyMileageComp')}</span><strong>${euro(data.kmComp)}</strong></div><div class="total"><span>${t('monthlyExpenses')}</span><strong>${euro(data.expenses)}</strong></div><div class="total"><span>${t('monthlyTotal')}</span><strong>${euro(data.total)}</strong></div>`; document.getElementById('reportRows').innerHTML=data.drives.length?data.drives.map(d=>`<div class="item"><div class="item-head"><div><div class="item-title">${formatDate(d.date)} · ${escapeHtml(d.placeName)}</div><div class="item-meta">${escapeHtml(buildRouteText(d))}</div></div><div class="right"><strong>${euro(d.total)}</strong></div></div><div class="item-meta">${t('tripType')}: ${d.roundTrip?t('roundTripLabel'):t('outbound')} · ${Number(d.distanceKm).toLocaleString('fi-FI',{maximumFractionDigits:1})} km · ${euro(d.kmCompensation)}${d.purpose?' · '+escapeHtml(d.purpose):''}</div>${(d.extraStops||[]).length?`<div class="chip-row" style="margin-top:10px">${d.extraStops.map((s,i)=>`<span class="chip">${t('stop')} ${i+1}: ${escapeHtml(s.address)}</span>`).join('')}</div>`:''}${(d.expenses||[]).length?`<div class="chip-row" style="margin-top:10px">${d.expenses.map(e=>`<span class="chip">${escapeHtml(e.type)} ${euro(e.amount)}</span>`).join('')}</div>`:''}</div>`).join(''):`<div class="empty">${t('reportNoTrips')}</div>`}
    function openPrintableReport(){const month=Number(document.getElementById('reportMonth').value), year=Number(document.getElementById('reportYear').value), data=getMonthData(month,year), name=state.settings.userName||(state.settings.language==='en'?'User':'Käyttäjä'), includeReceipts=!!document.getElementById('includeReceiptsInPdf').checked, mNames=monthNames[state.settings.language]||monthNames.fi; const receiptSections=includeReceipts?data.drives.map(d=>{const receipts=(d.expenses||[]).filter(e=>e.receiptDataUrl); if(!receipts.length) return ''; return `<div class="section receipt-break"><h2>${t('receiptSection')} · ${formatDate(d.date)} · ${escapeHtml(d.placeName)}</h2>${receipts.map((e,idx)=>`<div class="receipt-card"><div><strong>${idx+1}. ${escapeHtml(e.type)}</strong> · ${euro(e.amount)}</div><div class="small">${e.description?escapeHtml(e.description):''}</div><img src="${e.receiptDataUrl}" alt="Receipt" /></div>`).join('')}</div>`}).join(''):''; const html=`<!doctype html><html lang="${state.settings.language}"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>${escapeHtml(t('reportTitle'))}</title><style>body{font-family:Arial,sans-serif;padding:24px;color:#111}.report-topbar{display:flex;gap:10px;align-items:center;justify-content:flex-end;margin-bottom:14px}.report-btn{border:1px solid #bbb;background:#fff;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer}h1{margin:0 0 6px}h2{margin:0 0 10px}.muted{color:#555}.summary{margin:18px 0 22px;padding:14px;border:1px solid #ccc;border-radius:10px}.row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eee}.row:last-child{border-bottom:0}table{width:100%;border-collapse:collapse;margin-top:18px}th,td{padding:8px;border:1px solid #ddd;text-align:left;font-size:13px;vertical-align:top}th{background:#f6f6f6}.small{font-size:12px;color:#444}.section{margin-top:22px}.receipt-card{margin:14px 0 18px;padding:12px;border:1px solid #ddd;border-radius:10px;page-break-inside:avoid}.receipt-card img{margin-top:10px;max-width:100%;height:auto;border:1px solid #ddd;border-radius:8px}.receipt-break{page-break-before:always}@media print{.report-topbar{display:none}body{padding:0}}</style></head><body><div class="report-topbar"><button class="report-btn" onclick="window.print()">${escapeHtml(t('openPrintable'))}</button><button class="report-btn" onclick="if(window.opener&&!window.opener.closed){window.close()}else if(window.history.length>1){history.back()}else{window.close()}">${escapeHtml(t('backToApp'))}</button></div><h1>${escapeHtml(t('reportTitle'))}</h1><div class="muted">${escapeHtml(name)} · ${escapeHtml(mNames[month-1])} ${year}</div><div class="summary"><div class="row"><span>${escapeHtml(t('monthlyKilometers'))}</span><strong>${Number(data.km).toLocaleString('fi-FI',{maximumFractionDigits:1})} km</strong></div><div class="row"><span>${escapeHtml(t('monthlyMileageComp'))}</span><strong>${euro(data.kmComp)}</strong></div><div class="row"><span>${escapeHtml(t('monthlyExpenses'))}</span><strong>${euro(data.expenses)}</strong></div><div class="row"><span>${escapeHtml(t('monthlyTotal'))}</span><strong>${euro(data.total)}</strong></div><div class="row"><span>${escapeHtml(t('includeReceiptsInPdf'))}</span><strong>${includeReceipts?escapeHtml(t('receiptsInPdfYes')):escapeHtml(t('receiptsInPdfNo'))}</strong></div></div><table><thead><tr><th>${escapeHtml(t('date'))}</th><th>${escapeHtml(t('tripType'))}</th><th>${escapeHtml(t('start'))}</th><th>${escapeHtml(t('destination'))}</th><th>${escapeHtml(t('extraStops'))}</th><th>${escapeHtml(t('purpose'))}</th><th>Km</th><th>${escapeHtml(t('kmRate'))}</th><th>${escapeHtml(t('monthlyMileageComp'))}</th><th>${escapeHtml(t('expenses'))}</th><th>${escapeHtml(t('monthlyTotal'))}</th></tr></thead><tbody>${data.drives.map(d=>`<tr><td>${formatDate(d.date)}</td><td>${escapeHtml(d.roundTrip?t('roundTripLabel'):t('outbound'))}</td><td>${escapeHtml(d.startLabel)}<div class="small">${escapeHtml(d.startAddress)}</div></td><td>${escapeHtml(d.placeName)}<div class="small">${escapeHtml(d.destinationAddress)}</div></td><td>${(d.extraStops||[]).length?(d.extraStops.map((s,i)=>`${i+1}. ${escapeHtml(s.address)}`).join('<br>')):''}</td><td>${escapeHtml(d.purpose||'')}</td><td>${Number(d.distanceKm).toLocaleString('fi-FI',{maximumFractionDigits:1})}</td><td>${dec(d.kmRate)} €</td><td>${euro(d.kmCompensation)}</td><td>${euro(d.expenseTotal)}</td><td>${euro(d.total)}</td></tr>${(d.expenses||[]).length?`<tr><td></td><td colspan="10"><strong>${escapeHtml(t('expenseBreakdown'))}</strong> ${(d.expenses||[]).map(e=>`${escapeHtml(e.type)} ${euro(e.amount)}${e.description?' · '+escapeHtml(e.description):''}${e.receiptDataUrl?' · '+escapeHtml(t('createdWithReceipts')):''}`).join(' | ')}</td></tr>`:''}${d.notes?`<tr><td></td><td colspan="10"><strong>${escapeHtml(t('notePrefix'))}</strong> ${escapeHtml(d.notes)}</td></tr>`:''}`).join('')}</tbody></table>${receiptSections}</body></html>`; const w=window.open('','_blank'); if(!w) return; w.document.open(); w.document.write(html); w.document.close()}
    function exportJson(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}), a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='opero-ajot-varmuuskopio.json'; a.click(); URL.revokeObjectURL(a.href)}
    function importJson(event){const file=event.target.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=()=>{try{const data=JSON.parse(reader.result); if(!data.settings||!Array.isArray(data.drives)) throw new Error(); state=data; if(!state.settings.theme) state.settings.theme='dark'; if(!state.settings.language) state.settings.language='fi'; applyTheme(state.settings.theme); applyLanguage(); saveState(); fillReportSelectors(); renderSettings(); renderHome(); renderDrives(); refreshReport(); prepareNewDrive(); alert(t('backupImported'))}catch(e){alert(t('backupImportFailed'))}}; reader.readAsText(file); event.target.value=''}
    function formatDate(iso){const d=new Date(iso+'T00:00:00'); return d.toLocaleDateString(state.settings.language==='en'?'en-GB':'fi-FI')}
    function escapeHtml(str){return String(str||'').replace(/[&<>'"]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[s]))}
