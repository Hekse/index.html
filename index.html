<!doctype html>
<html lang="fi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ajo</title>

<style>
:root{
  --bg:#07111f;
  --panel:#0d1b2f;
  --line:rgba(125,170,255,.14);
  --text:#eef4ff;
  --brand:#2f80ff;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

.app{
  max-width:420px;
  margin:auto;
  padding:16px;
  padding-bottom:100px;
}

/* YLÄLAATIKOT */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.box{
  height:90px;
  border-radius:18px;
  border:1px solid var(--line);
  background:var(--panel);
  display:flex;
  align-items:center;
  justify-content:center;
}

.icon{
  width:36px;
  height:36px;
  stroke:#8eb8ff;
}

/* ALAVALIKKO */
.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  max-width:420px;
  margin:auto;
  padding:10px;
  background:var(--bg);
}

.nav-inner{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  border-radius:20px;
  background:var(--panel);
  border:1px solid var(--line);
}

.nav-btn{
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.nav-btn svg{
  width:26px;
  height:26px;
  stroke:#8eb8ff;
}
</style>
</head>

<body>

<div class="app">

<!-- YLÄLAATIKOT -->
<div class="grid">

<!-- UUSI AJO -->
<div class="box">
<svg viewBox="0 0 64 64">
  <rect x="16" y="20" width="32" height="22" rx="9" fill="#fff"/>
  <path d="M22 20l4-6h12l4 6z" fill="#fff"/>
  <circle cx="23" cy="45" r="4" fill="#fff"/>
  <circle cx="41" cy="45" r="4" fill="#fff"/>
  <path d="M32 20v10" stroke="#000" stroke-width="4"/>
  <path d="M27 25h10" stroke="#000" stroke-width="4"/>
</svg>
</div>

<!-- RAPORTTI -->
<div class="box">
<svg viewBox="0 0 64 64" class="icon">
  <path d="M20 10h18l12 12v28H20z" fill="none" stroke-width="3"/>
</svg>
</div>

<!-- AJOT -->
<div class="box">
<svg viewBox="0 0 64 64" class="icon">
  <path d="M24 8c8 10 8 20 0 28" stroke-width="4"/>
  <path d="M40 8c-8 10-8 20 0 28" stroke-width="4"/>
</svg>
</div>

<!-- ASETUKSET -->
<div class="box">
<svg viewBox="0 0 64 64" class="icon">
  <circle cx="32" cy="32" r="10" stroke-width="3"/>
</svg>
</div>

</div>

</div>

<!-- ALAVALIKKO -->
<div class="nav">
<div class="nav-inner">

<div class="nav-btn">
<svg viewBox="0 0 64 64">
  <path d="M12 28 32 12l20 16v24H12z" fill="none" stroke-width="3"/>
</svg>
</div>

<div class="nav-btn">
<svg viewBox="0 0 64 64">
  <rect x="16" y="20" width="32" height="22" rx="9" fill="#fff"/>
  <path d="M32 20v10" stroke="#000" stroke-width="4"/>
  <path d="M27 25h10" stroke="#000" stroke-width="4"/>
</svg>
</div>

<div class="nav-btn">
<svg viewBox="0 0 64 64">
  <path d="M24 8c8 10 8 20 0 28" stroke-width="4"/>
</svg>
</div>

<div class="nav-btn">
<svg viewBox="0 0 64 64">
  <path d="M20 10h18l12 12v28H20z" fill="none" stroke-width="3"/>
</svg>
</div>

</div>
</div>

</body>
</html>
